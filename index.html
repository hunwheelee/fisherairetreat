  {

    presenter: "Andrea Contigiani", email: "contigiani.1@osu.edu",
    abstract: "This study examines how the emergence of generative AI reshapes experimentation in early-stage ventures. Drawing on entrepreneurship and organizational learning research, the authors propose three mechanisms through which GenAI reduces the need for experimentation-related human capital: an efficiency channel, a precision channel, and a substitution channel.\n\nUsing the November 2022 release of ChatGPT as a technological shock, the authors construct a firm-month panel of more than 25,000 U.S. software ventures founded between 2018 and 2021. Ventures are classified as \u201cAI-ready\u201d based on whether their top management team had deep learning or machine learning expertise prior to ChatGPT\u2019s launch.\n\nUsing difference-in-differences and dynamic event-study designs, the study finds that AI-ready ventures grew faster overall after ChatGPT but allocated a smaller share of their workforce to experimentation-related roles. These findings suggest that GenAI may be shifting the entrepreneurial process away from traditional experimentation, with important implications for how early-stage ventures learn, allocate resources, and scale."

  {

    abstract: "AI-powered digital mental health products have been promoted as private and accessible tools for seeking support. However, this research identifies an important barrier to adoption: consumers may infer that using AI-powered mental health tools signals a lack of real-life social support.\n\nAcross four studies, the authors show that consumers anticipate feeling that they lack sufficient human support if they were to use AI-powered mental health products\u2014an inference less likely to arise for AI-powered wellness products focused on physical health. This anticipated inference leads to negative self-perceptions, which in turn reduce adoption.\n\nThe study also identifies two interventions that can increase adoption: positioning AI-powered mental health tools as supplemental to existing relationships rather than substitutes for them, and framing them situationally (\u201cavailable when needed\u201d) to signal that use reflects context rather than chronic need."

    abstract: "Delays in asynchronous healthcare communication can shift patients toward higher-cost care settings. In digital patient portals, patient-initiated requests enter provider inboxes and are managed under capacity constraints and competing demands. Because patients lack visibility into response timing, prolonged delays or non-response may prompt escalation to in-person care, including emergency department (ED) visits. We model these systems as decentralized service queues in which urgency is latent and must be inferred from unstructured patient messages. This makes prioritization necessary but fragile, as human triage is subject to inconsistency and workload-induced variability. Using data from a large U.S. health system, we show that unresolved messages are associated with a higher likelihood of ED utilization, with risk concentrated early after message initiation. We then leverage natural language processing to extract urgency signals from patient messages. By converting unstructured patient communication into actionable measures of urgency, AI augments human triage, supporting more consistent and scalable prioritization under congestion, where response delays shape behavior and misprioritization propagates downstream."

  {
    title: "If It\u2019s Easier, Why Do I Feel Worse? Impostor Thoughts Triggered By Generative AI Assistance",
    authors: "Hanho Lee, Zixu Zhang, Hun Whee Lee, Sarah P. Doyle, Robert B. Lount, Jr.",
    email: null,
    abstract: "As generative artificial intelligence (AI) shifts from a peripheral tool to a core workplace collaborator, it not only transforms how tasks are completed but also potentially reshapes how employees perceive their own worth. Drawing on attribution theory and research on impostor thoughts, we examine how the usage of generative AI tools triggers workplace impostor thoughts and their downstream consequences. Using 550 daily observations from 126 employees (Study 1; experience sampling methodology) and an online experiment from 277 working adults (Study 2; pre-registered experiment), our findings reveal that AI usage is positively associated with impostor thoughts, with this relationship intensifying when employees report lower task efficacy. Moreover, we document that impostor thoughts serve as a key mechanism linking AI usage to decision paralysis and feelings of inauthenticity. These findings highlight the psychological implications of AI integration and underscore the crucial role of efficacy in shaping employees\u2019 experiences and interactions with AI in the workplace."
  },
  {
    title: "Narrative Sensegiving and AI Engagement in Rural Entrepreneurial Ecosystems",
    authors: "Nkemdilim Chibuko",
    email: null,
    abstract: "A growing proportion of small businesses in the United States report experimenting with artificial intelligence (AI) tools to improve marketing, customer engagement, and operational efficiency. At the same time, public attitudes toward AI remain characterized by ambivalence and concern, with many Americans perceiving risks related to job displacement, privacy, and diminished human control. These tensions suggest that AI adoption is not solely a technical challenge, but an interpretive process shaped by uncertainty, legitimacy, and identity. Such dynamics may be particularly salient in rural communities, where small and medium enterprises serve as economic anchors and symbols of local resilience. When AI is perceived as misaligned with community values or economic realities, rural businesses may face distinct challenges in accepting emerging technologies. Drawing on qualitative analysis of 51 entrepreneurial success stories and interviews with regional institutional stakeholders, this study examines how storytelling functions as a mechanism of sensegiving that shapes how local business owners interpret the legitimacy, risks, and relevance of AI and other emerging digital technologies within a rural innovation ecosystem."
  },
  {
    title: "Gamified, Artificial-Intelligence-aided Lifestyle Change (GAIL)",
    authors: "Amaris Williams, Donya Nemati, Roberto Benzo, Joshua J. Joseph, Jennifer Shrodes, Sachin Kumar",
    email: null,
    abstract: "Lifestyle change is difficult to maintain. Gamification is a promising method of reviving flagging motivation among patients attempting lifestyle change. Gamification requires real-time assessment of target activities: diet and exercise. Physical activity can be objectively measured in real time, but diet currently can not. Artificial intelligence (AI) chat bots can measure diet in a low-burden way in real time, then assess the diet and provide feedback to patients.\n\nFew health applications are created with input from end users, which leads to poor acceptability and utility. A co-created, gamified lifestyle-change application could revolutionize lifestyle change, dietary assessment, research, and clinical care.\n\nGamified, Artificial-Intelligence-aided Lifestyle change (GAIL) is a recently-funded project to co-create an AI-based application with the people who would use it. We will recruit clinicians, researchers, and patients (stakeholders) to provide feedback. Initial focus groups will inform the design of the GAIL application. Once a prototype has been developed, the stakeholders will iteratively review the prototype.\n\nAccomplishing the GAIL project will build the foundation for future research, improved clinical lifestyle-related care, low-burden and accurate dietary assessment, and successful lifestyle change, better quality of life, and increased longevity among patients."
  },
  {
    title: "When the Black Box Enters Leisure: A Cognitive\u2013Affective Dual-Path Model of AI-Generated Video and Recovery",
    authors: "Yiming Huang, Kathleen Keeler",
    email: null,
    abstract: "Leisure media is typically assumed to facilitate recovery from work-related strain. However, AI-generated videos may differ from both traditional media and other forms of AI-generated art due to their distinctive characteristics, thereby shaping recovery experiences in unique ways. Drawing on predictive processing theory, we develop a dual-path cognitive\u2013affective model to examine how perceived realism, novelty, and unpredictability of AI videos influence users\u2019 recovery. Specifically, we propose that perceived realism and unpredictability increase uncertainty and vigilance while reducing enjoyment, whereas novelty is expected to heighten all three mechanisms. In turn, uncertainty and vigilance increase cognitive load, whereas enjoyment promotes relaxation.\n\nUsing an archival dataset of user comments from Reddit (N_comments = 12,104; N_posts = 988), we conducted AI-driven content analysis and multilevel modeling to test the proposed model. The results largely support the hypothesized relationships for perceived realism and unpredictability; however, contrary to expectations, novelty does not increase cognitive load. Together, these findings highlight the dual cognitive costs and affective benefits of AI-generated videos, offering a more nuanced understanding of leisure experiences in the age of AI. Future research should adopt experimental methods to more precisely test the causal pathways linking AI video features to recovery experiences."
  }
];

function renderAll() {
  renderPresentations();
  renderRoundtables();
  renderPosters();
}

function renderPresentations(filter) {
  const el = document.getElementById('sec-presentations');
  const q = (filter || '').toLowerCase();
  const filtered = presentations.filter(p => {
    if (!q) return true;
    return (p.title + ' ' + p.authors + ' ' + p.presenter + ' ' + p.abstract).toLowerCase().includes(q);
  });

  document.getElementById('count-presentations').textContent = filtered.length;

  if (filtered.length === 0) {
    el.innerHTML = '<div style="text-align:center;padding:3rem 1rem;color:var(--gray-5)"><h3 style="font-family:Playfair Display,serif;font-size:1.15rem;color:var(--gray-7);margin-bottom:0.25rem">No matching presentations</h3><p>Try adjusting your search terms.</p></div>';
    return;
  }

  el.innerHTML = filtered.map((p, i) => `
    <div class="pres-card" style="animation-delay:${i * 0.04}s">
      <div class="card-type presentation">Presentation</div>
      <h3>${esc(p.title)}</h3>
      <div class="authors">${esc(p.authors)}</div>
      <div class="presenter">Presenter: <a href="mailto:${p.email}">${esc(p.presenter)}</a></div>
      <div class="abstract collapsed" id="abs-p-${i}">${fmtAbs(p.abstract)}</div>
      <button class="read-more" onclick="toggle('abs-p-${i}',this)">Read more</button>
    </div>
  `).join('');
}

function renderRoundtables(filter) {
  const el = document.getElementById('sec-roundtables');
  const q = (filter || '').toLowerCase();
  const filtered = roundtables.filter(r => {
    if (!q) return true;
    return (r.title + ' ' + r.presenter + ' ' + r.role + ' ' + r.abstract).toLowerCase().includes(q);
  });

  document.getElementById('count-roundtables').textContent = filtered.length;

  if (filtered.length === 0) {
    el.innerHTML = '<div style="text-align:center;padding:3rem 1rem;color:var(--gray-5)"><h3 style="font-family:Playfair Display,serif;font-size:1.15rem;color:var(--gray-7);margin-bottom:0.25rem">No matching roundtables</h3><p>Try adjusting your search terms.</p></div>';
    return;
  }

  el.innerHTML = filtered.map((r, i) => `
    <div class="pres-card roundtable-card" style="animation-delay:${i * 0.04}s">
      <div class="card-type roundtable">Roundtable</div>
      <h3>${esc(r.title)}</h3>
      <div class="rt-role">${esc(r.role)}</div>
      <div class="presenter">Moderator: <a href="mailto:${r.email}">${esc(r.presenter)}</a></div>
      <div class="abstract collapsed" id="abs-r-${i}">${fmtAbs(r.abstract)}</div>
      <button class="read-more" onclick="toggle('abs-r-${i}',this)">Read more</button>
    </div>
  `).join('');
}

function renderPosters(filter) {
  const el = document.getElementById('sec-posters');
  const q = (filter || '').toLowerCase();
  const filtered = posters.filter(p => {
    if (!q) return true;
    return (p.title + ' ' + p.authors + ' ' + p.abstract).toLowerCase().includes(q);
  });

  document.getElementById('count-posters').textContent = filtered.length;

  if (filtered.length === 0) {
    el.innerHTML = '<div style="text-align:center;padding:3rem 1rem;color:var(--gray-5)"><h3 style="font-family:Playfair Display,serif;font-size:1.15rem;color:var(--gray-7);margin-bottom:0.25rem">No matching posters</h3><p>Try adjusting your search terms.</p></div>';
    return;
  }

  el.innerHTML = filtered.map((p, i) => `
    <div class="pres-card poster-card" style="animation-delay:${i * 0.04}s">
      <div class="card-type poster">Poster</div>
      <h3>${esc(p.title)}</h3>
      <div class="authors">${esc(p.authors)}</div>
      ${p.email ? '<div class="presenter">Contact: <a href="mailto:' + p.email + '">' + esc(p.email) + '</a></div>' : ''}
      <div class="abstract collapsed" id="abs-po-${i}">${fmtAbs(p.abstract)}</div>
      <button class="read-more" onclick="toggle('abs-po-${i}',this)">Read more</button>
    </div>
  `).join('');
}

function toggle(id, btn) {
  const el = document.getElementById(id);
  const collapsed = el.classList.toggle('collapsed');
  btn.textContent = collapsed ? 'Read more' : 'Show less';
}

function switchSection(tab) {
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  tab.classList.add('active');
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.getElementById('sec-' + tab.dataset.section).classList.add('active');
}

function filterCards() {
  const q = document.getElementById('search').value;
  renderPresentations(q);
  renderRoundtables(q);
  renderPosters(q);
}

function fmtAbs(text) {
  return text.split('\n').filter(s => s.trim()).map(p => '<p style="margin-bottom:0.5em">' + esc(p) + '</p>').join('');
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

renderAll();
</script>
